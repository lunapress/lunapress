name: 'Setup GitHub App'
description: 'Generates an installation token and configures bot metadata'
inputs:
  app_id:
    description: 'GitHub App ID'
    required: true
  private_key:
    description: 'GitHub App Private Key'
    required: true
  repositories:
    description: 'Comma-separated list of repositories'
    required: false
    default: ''

outputs:
  token:
    description: 'The generated installation token'
    value: ${{ steps.app-token.outputs.token }}
  bot_name:
    description: 'Name of the bot user'
    value: ${{ steps.bot-metadata.outputs.name }}
  bot_email:
    description: 'Email of the bot user'
    value: ${{ steps.bot-metadata.outputs.email }}

runs:
  using: "composite"
  steps:
    - name: Generate GitHub App Token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.private_key }}
        owner: ${{ github.repository_owner }}
        repositories: ${{ inputs.repositories }}

    - name: Configure Bot Metadata
      id: bot-metadata
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
      run: |
        BOT_USER_ID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/users/${APP_SLUG}%5Bbot%5D" | jq -r .id)
        echo "name=${APP_SLUG}[bot]" >> $GITHUB_OUTPUT
        echo "email=${BOT_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com" >> $GITHUB_OUTPUT