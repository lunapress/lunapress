name: Release CLI Phar

on:
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-phar:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: cli,lunapress

      - name: Configure Git Author
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          BOT_USER_ID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/users/${APP_SLUG}%5Bbot%5D" | jq -r .id)
          git config --global user.name "${APP_SLUG}"
          git config --global user.email "${BOT_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Checkout Monorepo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout CLI Repo
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/cli
          token: ${{ steps.app-token.outputs.token }}
          path: cli-dist
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2, box

      - name: Set Release Env
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=nightly" >> $GITHUB_ENV
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          fi

      - name: Use local packages
        working-directory: packages/cli
        run: "composer config repositories.local '{\"type\": \"path\", \"url\": \"../*\", \"options\": {\"symlink\": false}}'"

      - name: Build & Distribute
        working-directory: packages/cli
        run: |
          composer config repositories.local '{"type": "path", "url": "../*", "options": {"symlink": false}}'
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

          box compile

          find ../../cli-dist -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          mkdir -p ../../cli-dist/bin
          cp build/lunapress.phar ../../cli-dist/bin/lunapress.phar
          cp composer.dist.json ../../cli-dist/composer.json
          cp bin/lunapress.dist ../../cli-dist/bin/lunapress

      - name: Push to Split Repository
        working-directory: cli-dist
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git add -A .

          if [ "${{ env.IS_PRERELEASE }}" = "true" ]; then
            git checkout -B nightly
            git commit --amend --reset-author -m "Nightly Build: $(date -u)" || git commit -m "Nightly Build: $(date -u)"
            git push origin refs/heads/nightly --force
            git tag -f nightly
            git push origin refs/tags/nightly --force
          else
            git commit -m "Release ${{ env.RELEASE_TAG }}"
            git tag "${{ env.RELEASE_TAG }}"
            git push origin main "${{ env.RELEASE_TAG }}"
          fi

      - name: Attest
        uses: actions/attest@v4
        with:
          subject-path: packages/cli/build/lunapress.phar
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Upload Phar
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ github.repository_owner }}/cli
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.IS_PRERELEASE == 'true' && 'Nightly Build' || env.RELEASE_TAG }}
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          generate_release_notes: true
          body: ${{ env.IS_PRERELEASE == 'true' && ' ' || '' }}
          files: |
            packages/cli/build/lunapress.phar
          make_latest: ${{ env.IS_PRERELEASE == 'false' }}
